name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'

      - name: Get version info
        id: version
        run: |
          echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_TIME: ${{ steps.version.outputs.build_time }}
          GIT_COMMIT: ${{ steps.version.outputs.commit }}
        run: |
          LD_FLAGS="-s -w -X 'main.Version=${VERSION}' -X 'main.BuildTime=${BUILD_TIME}' -X 'main.GitCommit=${GIT_COMMIT}'"

          GOOS=linux   GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LD_FLAGS}" -o dist/dataflow-linux-amd64 ./cmd/dataflow
          GOOS=linux   GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LD_FLAGS}" -o dist/dataflow-linux-arm64 ./cmd/dataflow
          GOOS=darwin  GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LD_FLAGS}" -o dist/dataflow-darwin-amd64 ./cmd/dataflow
          GOOS=darwin  GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "${LD_FLAGS}" -o dist/dataflow-darwin-arm64 ./cmd/dataflow
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "${LD_FLAGS}" -o dist/dataflow-windows-amd64.exe ./cmd/dataflow

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
