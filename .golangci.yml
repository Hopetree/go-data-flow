version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
      exclude-functions:
        - (encoding/json.Encoder).Encode
        - (encoding/json.Decoder).Decode
        - (net/http.Request).Write
        - (net/http.ResponseWriter).Write
        - (net/http.ResponseWriter).WriteHeader
        - (io.WriteCloser).Close
        - (io.Closer).Close
        - (*os.File).Close
        - (*os.File).Sync
        - (*os.File).Write
        - (io.Writer).Write

    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - revive
        text: "should not use print"
      - path: generated\.go
        linters:
          - all

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
