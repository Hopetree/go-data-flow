version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "sayRepetitiveInsteadOfStutters"

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - revive
        text: "should not use print"
      - path: generated\.go
        linters:
          - all

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
